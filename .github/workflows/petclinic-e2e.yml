name: PetClinic E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 0"

jobs:
  petclinic-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain image
        run: docker compose build --no-cache toolchain

      - name: Run spring-petclinic E2E
        run: docker compose run --rm petclinic-e2e

      - name: Upload petclinic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-e2e
          path: |
            spring-petclinic/metadata/symbols.db
            spring-petclinic/metadata/vet-controller.stub.java
          if-no-files-found: ignore
